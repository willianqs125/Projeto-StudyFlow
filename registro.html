<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | StudyFlow</title>
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="registro.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="register-card">
        <div class="header-card">
            <div class="emoji-logo">📋</div>
            <h2>Criar sua conta</h2>
            <p>Comece a organizar sua rotina hoje mesmo.</p>
        </div>

        <form id="registerForm">
            <div class="input-group">
                <label for="regName">Nome Completo</label>
                <input type="text" id="regName" placeholder="Seu nome" required>
            </div>
            <div class="input-group">
                <label for="regEmail">E-mail</label>
                <input type="email" id="regEmail" placeholder="seu@email.com" required>
            </div>
            <div class="input-group">
                <label for="regPassword">Senha</label>
                <input type="password" id="regPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-register">Criar conta gratuita</button>
        </form>

        <div class="divider">ou cadastre-se com</div>
        <button class="btn-google">Google</button>

        <div class="footer-link">
            <p>Já possui uma conta? <a href="login1.html">Fazer login</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value.toLowerCase().trim();
            const password = document.getElementById('regPassword').value;

            let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];

            if (users.some(user => user.email === email)) {
                alert('Este e-mail já está cadastrado!');
                return;
            }

            users.push({ name, email, password });
            localStorage.setItem('registeredUsers', JSON.stringify(users));

            alert('Conta criada com sucesso!');
            window.location.href = 'login1.html';
        });
    </script>
</body>
</html>
